version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    groups:
      svelte:
        patterns:
          - "svelte*"
          - "@sveltejs/*"
          - "svelte-*"
      vite:
        patterns:
          - "vite"
          - "@vitejs/*"
          - "vite-*"
          - "@vite-pwa/*"
      tailwind:
        patterns:
          - "tailwindcss"
          - "@tailwindcss/*"
      drizzle:
        patterns:
          - "drizzle-orm"
          - "drizzle-kit"
      dev-dependencies:
        dependency-type: "development"
      production-dependencies:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "ci"
