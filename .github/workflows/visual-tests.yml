name: Visual Screenshots

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]

jobs:
  screenshots:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - run: bun install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('bun.lock') }}

      - name: Install Playwright system deps
        run: bunx playwright install-deps chromium

      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: bunx playwright install chromium

      - name: Run visual screenshot tests
        run: bunx playwright test

      - name: Upload screenshots
        if: '!cancelled()'
        uses: actions/upload-artifact@v4
        with:
          name: visual-screenshots
          path: e2e/screenshots/
          retention-days: 30

      - name: Post PR comment
        if: ${{ !cancelled() }}
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const screenshotDir = 'e2e/screenshots';

            if (!fs.existsSync(screenshotDir)) {
              console.log('No screenshots directory found');
              return;
            }

            const files = fs.readdirSync(screenshotDir).filter(f => f.endsWith('.png'));
            if (files.length === 0) {
              console.log('No screenshots found');
              return;
            }

            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const sha = context.payload.pull_request.head.sha.substring(0, 7);

            let body = `## 📷 Visual Screenshots (\`${sha}\`)\n\n`;
            body += `Screenshots captured for this PR.\n\n`;
            body += `**[Download screenshots](${runUrl}#artifacts)**\n\n`;
            body += `| Page | Status |\n|------|--------|\n`;
            for (const file of files) {
              const name = file.replace('.png', '').replace(/-/g, ' ');
              body += `| ${name} | ✅ Captured |\n`;
            }
            body += `\n---\n*Generated by visual screenshot tests*`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body && c.body.includes('Visual Screenshots')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
