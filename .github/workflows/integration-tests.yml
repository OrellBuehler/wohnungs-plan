name: PR Checks

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]

jobs:
  integration-tests:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Type check
        run: bun run check

      - name: Run tests
        run: bun run test
